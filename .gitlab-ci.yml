default:
  image: php:8.4-cli
  services:
    - mysql:8.0

variables:
  MYSQL_DATABASE: laravel
  MYSQL_ROOT_PASSWORD: secret
  DB_HOST: mysql
  DB_USERNAME: root
  DB_PASSWORD: secret

stages:
  - test
  - deploy

# ================================
# STAGE 1: TEST
# ================================
unit_test:
  stage: test
  before_script:
    - apt-get update -qq && apt-get install -qq git curl zip unzip libpng-dev libonig-dev libxml2-dev libzip-dev
    - docker-php-ext-install pdo_mysql mbstring zip
    - curl --silent --show-error "https://getcomposer.org/installer" | php -- --install-dir=/usr/local/bin --filename=composer
  script:
    - cp .env.example .env
    - composer install --no-interaction --prefer-dist
    - php artisan key:generate
    - php artisan migrate --force
    - vendor/bin/phpunit
  only:
    - master

# ================================
# STAGE 2: DEPLOY
# ================================
deploy_production:
  stage: deploy
  before_script:
    - apt-get update -qq && apt-get install -qq openssh-client rsync
    - curl --silent --show-error "https://getcomposer.org/installer" | php -- --install-dir=/usr/local/bin --filename=composer
    - composer global require "laravel/envoy=~2.0"
    - export PATH="/root/.config/composer/vendor/bin:$PATH"
    - which ssh-agent || ( apt-get update -y && apt-get install openssh-client -y )
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config
  script:
    - envoy run deploy --commit="$CI_COMMIT_SHA"
  environment:
    name: production
    url: http://172.29.18.240
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
