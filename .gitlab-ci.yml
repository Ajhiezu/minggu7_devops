default:
  image: php:8.4-cli

stages:
  - test
  - deploy

unit_test:
  stage: test
  before_script:
    - sudo apt-get update -qq
    - sudo apt-get install -qq git curl zip unzip libpng-dev libonig-dev libxml2-dev libzip-dev
    - sudo docker-php-ext-install pdo_mysql mbstring zip
    - curl --silent --show-error "https://getcomposer.org/installer" | php -- --install-dir=/usr/local/bin --filename=composer
  script:
    - cp .env.example .env
    - composer install --no-interaction --prefer-dist
    - php artisan key:generate
    - vendor/bin/phpunit
  only:
    - master

deploy_production:
  stage: deploy
  before_script:
    - sudo apt-get update -qq
    - sudo apt-get install -qq openssh-client git curl zip unzip
    - curl --silent --show-error "https://getcomposer.org/installer" | php -- --install-dir=/usr/local/bin --filename=composer
    - composer global require "laravel/envoy=~2.12.1"
    - export PATH="$HOME/.config/composer/vendor/bin:$PATH"
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config
  script:
    - envoy run deploy --commit="$CI_COMMIT_SHA"
  environment:
    name: production
    url: http://127.0.0.1
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
