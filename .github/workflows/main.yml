name: Laravel CI

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'

    - name: Install Dependencies
      run: composer install

    - name: Setup Laravel
      run: |
        cp .env.example .env
        php artisan key:generate

    - name: Test Action
      run: echo "GitHub Actions BERHASIL ✅"
